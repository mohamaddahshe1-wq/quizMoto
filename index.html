<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الدراجات الآلية 2025</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 107, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(78, 205, 196, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-family: 'Cairo', sans-serif;
            font-size: 2.5em;
            font-weight: 800;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
        }

        .progress-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50px;
            padding: 8px;
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 12px;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            border-radius: 50px;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            font-size: 1.1em;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            font-weight: 700;
            font-size: 1.3em;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transform: translateY(20px);
            opacity: 0;
            animation: slideIn 0.5s forwards;
        }

        @keyframes slideIn {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .question-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .question-number {
            background: linear-gradient(135deg, #ff6b6b, #ff8787);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2em;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .question-text {
            font-size: 1.3em;
            font-weight: 600;
            line-height: 1.6;
            flex: 1;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 20px 25px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .option:hover:not(.disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(78, 205, 196, 0.5);
            transform: translateX(-5px);
            box-shadow: 0 4px 20px rgba(78, 205, 196, 0.2);
        }

        .option-letter {
            background: rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1em;
        }

        .option.correct {
            background: rgba(78, 205, 196, 0.2);
            border-color: #4ecdc4;
            animation: correctPulse 0.6s;
        }

        .option.correct .option-letter {
            background: #4ecdc4;
            color: #1a1a2e;
        }

        .option.incorrect {
            background: rgba(255, 107, 107, 0.2);
            border-color: #ff6b6b;
            animation: incorrectShake 0.6s;
        }

        .option.incorrect .option-letter {
            background: #ff6b6b;
            color: white;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes incorrectShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .feedback {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            text-align: center;
            opacity: 0;
            transform: translateY(-10px);
        }

        .feedback.show {
            animation: feedbackSlide 0.4s forwards;
        }

        @keyframes feedbackSlide {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback.correct {
            background: rgba(78, 205, 196, 0.2);
            border: 2px solid #4ecdc4;
            color: #4ecdc4;
        }

        .feedback.incorrect {
            background: rgba(255, 107, 107, 0.2);
            border: 2px solid #ff6b6b;
            color: #ff6b6b;
        }

        .next-btn {
            background: linear-gradient(135deg, #4ecdc4, #44a3a0);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(78, 205, 196, 0.3);
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(78, 205, 196, 0.4);
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .results {
            text-align: center;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .results h2 {
            font-family: 'Cairo', sans-serif;
            font-size: 2.5em;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score {
            font-size: 4em;
            font-weight: 800;
            margin: 30px 0;
        }

        .score.passing {
            color: #4ecdc4;
            text-shadow: 0 0 30px rgba(78, 205, 196, 0.5);
        }

        .score.failing {
            color: #ff6b6b;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
        }

        .restart-btn {
            background: linear-gradient(135deg, #ff6b6b, #ff8787);
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 107, 107, 0.4);
        }

        .group-title {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 12px;
            margin: 40px 0 25px 0;
            font-size: 1.3em;
            font-weight: 700;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .question-card {
                padding: 25px;
            }
            
            .question-text {
                font-size: 1.1em;
            }
            
            .stats {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>

            `;
            
            answered = false;
            updateProgress();
        }

        function checkAnswer(selected) {
            if (answered) return;
            
            const question = quizData[currentQuestionIndex];
            const options = document.querySelectorAll('.option');
            const feedback = document.getElementById('feedback');
            const nextBtn = document.getElementById('nextBtn');
            
            answered = true;
            
            // Disable all options
            options.forEach(opt => opt.classList.add('disabled'));
            
            if (selected === question.correct) {
                options[selected].classList.add('correct');
                feedback.textContent = '✓ إجابة صحيحة!';
                feedback.className = 'feedback correct show';
                correctAnswers++;
            } else {
                options[selected].classList.add('incorrect');
                options[question.correct].classList.add('correct');
                feedback.textContent = '✗ إجابة خاطئة. الجواب الصحيح هو: ' + String.fromCharCode(65 + question.correct);
                feedback.className = 'feedback incorrect show';
                incorrectAnswers++;
            }
            
            nextBtn.disabled = false;
            updateStats();
        }

        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex < quizData.length) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / quizData.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
            document.getElementById('totalQuestions').textContent = quizData.length;
        }

        function updateStats() {
            document.getElementById('correctCount').textContent = correctAnswers;
            document.getElementById('incorrectCount').textContent = incorrectAnswers;
        }

        function showResults() {
            const container = document.getElementById('quizContainer');
            const percentage = Math.round((correctAnswers / quizData.length) * 100);
            const passing = percentage >= 70;
            
            container.innerHTML = `
                <div class="results">
                    <h2>${passing ? '🎉 مبروك!' : '😔 حاول مرة أخرى'}</h2>
                    <div class="score ${passing ? 'passing' : 'failing'}">${percentage}%</div>
                    <p style="font-size: 1.3em; margin: 20px 0;">
                        لقد أجبت على <strong>${correctAnswers}</strong> سؤال بشكل صحيح من أصل <strong>${quizData.length}</strong>
                    </p>
                    <p style="font-size: 1.1em; color: ${passing ? '#4ecdc4' : '#ff6b6b'};">
                        ${passing ? 'أنت مستعد للاختبار!' : 'تحتاج إلى المزيد من الدراسة. النجاح يتطلب 70٪ على الأقل.'}
                    </p>
                    <button class="restart-btn" onclick="restartQuiz()">ابدأ من جديد</button>
                </div>
            `;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            correctAnswers = 0;
            incorrectAnswers = 0;
            answered = false;
            renderQuestion();
            updateStats();
        }

        // Initialize
        renderQuestion();
        updateStats();
    </script>
</body>
</html>
